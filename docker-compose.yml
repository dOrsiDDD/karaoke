services:
  backend:
    build: ./backend
    env_file:
      - .env
    container_name: karaoke_backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy


  db:
    image: postgres:15
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karaoke_user -d karaoke"]
      interval: 5s
      timeout: 5s
      retries: 5
    container_name: karaoke_db
    environment:
      POSTGRES_USER: karaoke_user
      POSTGRES_PASSWORD: karaoke_pass
      POSTGRES_DB: karaoke
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" 
volumes:
  db_data:
